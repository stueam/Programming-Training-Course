<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}音乐网{% endblock %}</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }
    a { color: #1a73e8; text-decoration: none; }
    a:hover { text-decoration: underline; }
    img { max-width: 100%; height: auto; display: block; }

    .header { background: #1a1a2e; color: #fff; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; height: 64px; padding: 0 20px; gap: 20px; }
    .logo { font-size: 22px; font-weight: 700; color: #fff; flex-shrink: 0; display: flex; align-items: center; gap: 8px; }
    .logo:hover { text-decoration: none; }
    .logo svg { width: 28px; height: 28px; fill: #e94560; }
    .nav { display: flex; gap: 4px; flex-shrink: 0; }
    .nav a { color: #b0b0c0; font-size: 14px; padding: 6px 14px; border-radius: 4px; transition: all 0.2s; }
    .nav a:hover { color: #fff; background: rgba(255,255,255,0.08); text-decoration: none; }
    .nav a.active { color: #fff; background: #e94560; }

    .search-wrap { margin-left: auto; display: flex; align-items: center; gap: 8px; flex: 1; max-width: 460px; justify-content: flex-end; }
    .search-wrap input[type="text"] { padding: 7px 12px; border: 1px solid #3a3a5c; border-radius: 4px; background: #16213e; color: #fff; font-size: 13px; width: 160px; outline: none; transition: border-color 0.2s; }
    .search-wrap input[type="text"]:focus { border-color: #e94560; }
    .search-wrap input[type="text"]::placeholder { color: #666; }
    .search-radio { display: flex; gap: 10px; font-size: 13px; color: #aaa; flex-shrink: 0; }
    .search-radio label { cursor: pointer; display: flex; align-items: center; gap: 3px; user-select: none; }
    .search-radio input { accent-color: #e94560; }
    .search-wrap .search-btn { padding: 7px 16px; background: #e94560; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; flex-shrink: 0; transition: background 0.2s; }
    .search-wrap .search-btn:hover { background: #d63851; }

    .main { max-width: 1200px; margin: 24px auto; padding: 0 20px; min-height: calc(100vh - 120px); }

    .card { background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow: hidden; }
    .card-header { padding: 16px 24px; border-bottom: 1px solid #f0f0f0; font-size: 18px; font-weight: 600; display: flex; align-items: center; justify-content: space-between; }
    .card-body { padding: 0; }

    .list-item { display: flex; align-items: center; gap: 16px; padding: 14px 20px; border-bottom: 1px solid #f5f5f5; transition: background 0.15s; cursor: pointer; }
    .list-item:last-child { border-bottom: none; }
    .list-item:hover { background: #fafbfc; }
    .list-item a { display: flex; align-items: center; gap: 16px; width: 100%; color: inherit; }
    .list-item a:hover { text-decoration: none; }
    .list-item img { width: 52px; height: 52px; object-fit: cover; border-radius: 6px; background: #eee; flex-shrink: 0; }
    .list-item .info { flex: 1; min-width: 0; }
    .list-item .info .name { font-size: 15px; font-weight: 500; color: #222; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .list-item .info .sub { font-size: 13px; color: #888; margin-top: 3px; }

    .pagination { display: flex; align-items: center; justify-content: center; gap: 4px; padding: 20px; flex-wrap: wrap; }
    .page-link { display: inline-flex; align-items: center; justify-content: center; min-width: 36px; height: 36px; padding: 0 8px; border: 1px solid #e0e0e0; border-radius: 6px; background: #fff; color: #444; font-size: 14px; transition: all 0.2s; cursor: pointer; user-select: none; }
    .page-link:hover { border-color: #1a73e8; color: #1a73e8; text-decoration: none; }
    .page-link.current { background: #1a73e8; color: #fff; border-color: #1a73e8; }
    .page-jump { display: flex; align-items: center; gap: 4px; margin-left: 12px; font-size: 13px; color: #888; }
    .page-jump input { width: 46px; height: 36px; text-align: center; border: 1px solid #e0e0e0; border-radius: 6px; font-size: 14px; outline: none; }
    .page-jump input:focus { border-color: #1a73e8; }
    .page-jump button { height: 36px; padding: 0 12px; background: #1a73e8; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }

    .detail-header { display: flex; gap: 28px; padding: 28px 24px; }
    .detail-header img { width: 220px; height: 220px; object-fit: cover; border-radius: 10px; background: #eee; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .detail-info { flex: 1; padding-top: 4px; }
    .detail-info h1 { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
    .detail-info .meta { font-size: 14px; color: #666; line-height: 2; }
    .detail-info .meta strong { color: #444; }
    .detail-info .url-link { display: inline-flex; align-items: center; gap: 4px; margin-top: 4px; font-size: 13px; }

    .lyrics { padding: 20px 24px; white-space: pre-wrap; line-height: 1.9; font-size: 14px; color: #444; max-height: 420px; overflow-y: auto; background: #fafafa; margin: 0 24px 20px; border-radius: 8px; border: 1px solid #eee; }

    .section-title { padding: 16px 24px 0; font-size: 16px; font-weight: 600; color: #333; }

    .comment-form { padding: 16px 24px 20px; border-top: 1px solid #eee; }
    .comment-form textarea { width: 100%; height: 72px; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; resize: vertical; font-family: inherit; outline: none; transition: border-color 0.2s; }
    .comment-form textarea:focus { border-color: #1a73e8; }
    .comment-form .btn-row { display: flex; justify-content: flex-end; margin-top: 8px; }
    .comment-form button { padding: 8px 24px; background: #e94560; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; transition: background 0.2s; }
    .comment-form button:hover { background: #d63851; }

    .comment-item { padding: 14px 24px; border-bottom: 1px solid #f5f5f5; display: flex; justify-content: space-between; align-items: flex-start; }
    .comment-item:last-child { border-bottom: none; }
    .comment-body { flex: 1; min-width: 0; }
    .comment-body .text { font-size: 14px; color: #333; line-height: 1.6; word-break: break-word; }
    .comment-body .time { font-size: 12px; color: #aaa; margin-top: 4px; }
    .comment-delete { padding: 4px 12px; background: none; border: 1px solid #e0e0e0; border-radius: 4px; color: #999; cursor: pointer; font-size: 12px; flex-shrink: 0; transition: all 0.2s; margin-left: 12px; }
    .comment-delete:hover { border-color: #e94560; color: #e94560; }

    .song-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; padding: 20px 24px; }
    .song-card { text-align: center; padding: 12px 8px; border-radius: 10px; transition: background 0.2s; cursor: pointer; }
    .song-card:hover { background: #f8f9fa; }
    .song-card a:hover { text-decoration: none; }
    .song-card img { width: 130px; height: 130px; object-fit: cover; border-radius: 8px; background: #eee; margin: 0 auto; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .song-card .name { margin-top: 8px; font-size: 13px; color: #333; font-weight: 500; line-height: 1.3; }

    .singer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; padding: 20px 24px; }
    .singer-grid-item { text-align: center; padding: 16px 8px; border-radius: 10px; transition: background 0.2s; }
    .singer-grid-item:hover { background: #f8f9fa; }
    .singer-grid-item a:hover { text-decoration: none; }
    .singer-grid-item img { width: 90px; height: 90px; object-fit: cover; border-radius: 50%; background: #eee; margin: 0 auto; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .singer-grid-item .name { margin-top: 8px; font-size: 14px; color: #333; font-weight: 500; }

    .search-info { padding: 14px 20px; background: #e8f0fe; border-radius: 8px; margin-bottom: 16px; font-size: 14px; color: #1a73e8; line-height: 1.6; }
    .search-info strong { color: #333; }

    .intro-text { padding: 0 24px 24px; line-height: 1.9; font-size: 14px; color: #555; }

    .empty { text-align: center; padding: 60px 20px; color: #aaa; font-size: 15px; }

    .footer { text-align: center; padding: 20px; color: #aaa; font-size: 12px; border-top: 1px solid #eee; margin-top: 40px; }

    @media (max-width: 768px) {
      .header-inner { flex-wrap: wrap; height: auto; padding: 10px 16px; gap: 10px; }
      .search-wrap { max-width: 100%; justify-content: flex-start; flex-wrap: wrap; }
      .search-wrap input[type="text"] { flex: 1; }
      .detail-header { flex-direction: column; align-items: center; text-align: center; }
      .detail-header img { width: 160px; height: 160px; }
      .song-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; padding: 16px; }
      .song-card img { width: 100px; height: 100px; }
      .singer-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; padding: 16px; }
      .singer-grid-item img { width: 70px; height: 70px; }
      .main { margin: 16px auto; padding: 0 12px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="{% url 'song_list' %}" class="logo">
        <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        音乐网
      </a>
      <nav class="nav">
        <a href="{% url 'song_list' %}" class="{% if request.resolver_match.url_name == 'song_list' %}active{% endif %}">歌曲列表</a>
        <a href="{% url 'singer_list' %}" class="{% if request.resolver_match.url_name == 'singer_list' %}active{% endif %}">歌手列表</a>
      </nav>
      <form class="search-wrap" action="{% url 'search' %}" method="GET">
        <input type="text" name="q" placeholder="搜索歌曲/歌手..." maxlength="20" value="{{ request.GET.q }}" required>
        <div class="search-radio">
          <label><input type="radio" name="type" value="song" {% if request.GET.type != 'singer' %}checked{% endif %}> 歌曲</label>
          <label><input type="radio" name="type" value="singer" {% if request.GET.type == 'singer' %}checked{% endif %}> 歌手</label>
        </div>
        <button class="search-btn" type="submit">搜索</button>
      </form>
    </div>
  </header>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
  <div class="footer">音乐网 &copy; 2026</div>
</body>
</html>
