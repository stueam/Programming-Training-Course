<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}酷猫音乐{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary: #6c5ce7;
            --primary-light: #a29bfe;
            --accent: #fd79a8;
            --bg-subtle: #f8f7ff;
        }
        body {
            background: #fafafe;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .card {
            border: none;
            transition: box-shadow 0.2s ease;
        }
        .card:hover {
            box-shadow: 0 0.5rem 1.5rem rgba(108,92,231,0.08) !important;
        }
        .navbar-brand {
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .breadcrumb {
            background: transparent;
            padding: 0;
        }
        .lyrics-scroll {
            max-height: 65vh;
            overflow-y: auto;
        }
        .lyrics-scroll pre {
            white-space: pre-wrap;
            font-family: inherit;
            font-size: 0.95rem;
            line-height: 2;
            color: #2d3436;
            padding: 0.25rem 0;
        }
        .lyrics-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .lyrics-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .lyrics-scroll::-webkit-scrollbar-thumb {
            background: var(--primary-light);
            border-radius: 3px;
        }
        .lyrics-scroll::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }
        .song-info-bar .card-body {
            background: linear-gradient(135deg, var(--bg-subtle), #fff);
        }
        .btn {
            transition: all 0.2s ease;
        }
        .btn-outline-primary:hover {
            background: var(--primary);
            border-color: var(--primary);
        }
        .empty-state i {
            display: block;
        }
        .comment-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .badge-gradient {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #fff;
        }
        footer {
            font-size: 0.85rem;
        }
        .singer-card:hover {
            transform: translateY(-2px);
            transition: transform 0.2s ease;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'song_list' %}">
                <i class="bi bi-music-note-beamed"></i> 酷猫音乐
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'song_list' %}">歌曲列表</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'singer_list' %}">歌手列表</a>
                    </li>
                </ul>
                <form class="d-flex" action="{% url 'search' %}" method="GET">
                    <select name="type" class="form-select form-select-sm me-2" style="width: auto;">
                        <option value="song">歌曲</option>
                        <option value="singer">歌手</option>
                    </select>
                    <input class="form-control form-control-sm me-2" type="search" name="q" placeholder="搜索..." aria-label="Search">
                    <button class="btn btn-outline-light btn-sm" type="submit"><i class="bi bi-search"></i></button>
                </form>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center text-muted py-4 mt-5 border-top">
        <small>&copy; 2026 酷猫音乐 - 数据来源于网络</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
